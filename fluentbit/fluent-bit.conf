[SERVICE]
    Flush         1
    Log_Level     info
    Daemon        off
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    Parsers_File  parser.conf

[INPUT]
    Name              tail
    Path              /var/log/server/system.log
    Tag               system.log
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Read_from_Head    true

[INPUT]
    Name              tail
    Path              /var/log/server/search.log
    Tag               search.log
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Read_from_Head    true

[INPUT]
    Name              tail
    Path              /var/log/server/interaction.log
    Tag               interaction.log
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Read_from_Head    true

[FILTER]
    Name                parser
    Match               system.log
    Key_Name            log
    Parser              json
    Reserve_Data        On
    Preserve_Key        On

[FILTER]
    Name                parser
    Match               search.log
    Key_Name            log
    Parser              json
    Reserve_Data        On
    Preserve_Key        On

[FILTER]
    Name                parser
    Match               interaction.log
    Key_Name            log
    Parser              json
    Reserve_Data        On
    Preserve_Key        On

[FILTER]
    Name                record_modifier
    Match               system.log
    Record              log_type system

[FILTER]
    Name                record_modifier
    Match               search.log
    Record              log_type search

[FILTER]
    Name                record_modifier
    Match               interaction.log
    Record              log_type interaction

[FILTER]
    Name modify
    Match system.log
    Remove log

[FILTER]
    Name modify
    Match search.log
    Remove log

[FILTER]
    Name modify
    Match interaction.log
    Remove log

[OUTPUT]
    Name              opensearch
    Match             system.log
    Host              ${OPENSEARCH_HOST}
    Port              9200
    Index             system-logs-%Y.%m.%d
    HTTP_User         ${OPENSEARCH_USER}
    HTTP_Passwd       ${OPENSEARCH_PASSWORD}
    tls               On
    tls.verify        Off
    Suppress_Type_Name On

[OUTPUT]
    Name              opensearch
    Match             search.log
    Host              ${OPENSEARCH_HOST}
    Port              9200
    Index             search-logs-%Y.%m.%d
    HTTP_User         ${OPENSEARCH_USER}
    HTTP_Passwd       ${OPENSEARCH_PASSWORD}
    tls               on
    tls.verify        Off
    Suppress_Type_Name On

[OUTPUT]
    Name              opensearch
    Match             interaction.log
    Host              ${OPENSEARCH_HOST}
    Port              9200
    Index             interaction-logs-%Y.%m.%d
    HTTP_User         ${OPENSEARCH_USER}
    HTTP_Passwd       ${OPENSEARCH_PASSWORD}
    tls               On
    tls.verify        Off
    Suppress_Type_Name On

# For local development, use console output when OpenSearch is disabled
[OUTPUT]
    Name              stdout
    Match             *
    Format            json_lines
