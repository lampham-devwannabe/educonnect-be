server:
  port: 8080
  tomcat:
    max-connections: 8192
    connection-timeout: 20000
    min-spare-threads: 10
    reject-illegal-header-name: true
    reject-illegal-header-value: true
    relaxed-query-chars: "[,],|"
    relaxed-path-chars: "[,],|"
    max-parameter-count: 10000

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 1000
  messages:
    encoding: UTF-8
  opensearch:
    uris: ${OPENSEARCH_HOST}
    username: ${OPENSEARCH_USER}
    password: ${OPENSEARCH_PASSWORD}
    model: ${OPENSEARCH_MODEL}

logging:
  level:
    root: INFO
    com.sep.educonnect: INFO
    org.apache.coyote.http11.Http11Processor: WARN
    org.apache.coyote.http11.Http11InputBuffer: WARN
    org.apache.tomcat.util.http.parser.Cookie: WARN
    org.apache.catalina.connector.CoyoteAdapter: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

rate-limit:
  capacity: 3
  refill-tokens: 3
  refill-duration: 1

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: ${JWT_VALID_DURATION:3600}
  refreshable-duration: ${JWT_REFRESHABLE_DURATION:86400}

s3:
  access-key: ${S3_ACCESS_KEY}
  secret-key: ${S3_SECRET_KEY}
  bucket-name: "educonnect-bucket"
  region: "ap-southeast-1"

cdn:
  domain: ${CDN_DOMAIN}
  key: ${KEY_PAIR_ID}
mailgun:
  domain: ${MAILGUN_DOMAIN}
  from: ${MAILGUN_FROM}
  name: ${MAILGUN_NAME}
  api-key: ${MAILGUN_API_KEY}

openai:
  api-key: ${OPENAI_API_KEY}

zoom:
  account-id: ${ZOOM_ACCOUNT_ID}
  client-id: ${ZOOM_CLIENT_ID}
  client-secret: ${ZOOM_CLIENT_SECRET}

payos:
  client-id: ${PAYOS_CLIENT_ID}
  api-key: ${PAYOS_CLIENT_SECRET}
  check-sum: ${PAYOS_CHECKSUM_KEY}
  return-url: ${PAYOS_RETURN_URL}
  cancel-url: ${PAYOS_CANCEL_URL}

video:
  s3:
    base-prefix: "videos/lessons"
  cloudfront:
    manifest-expiry-seconds: 600
  lambda:
    function-name: ${VIDEO_LAMBDA_FUNCTION_NAME:educonnect-video-transcoder}
    region: ${VIDEO_LAMBDA_REGION:ap-southeast-1}
    callback-url: ${CALLBACK_API_URL:}

recommendation:
  url: ${RECOMMENDATION_API_URL}

app:
  frontend-url: ${FRONTEND_URL:https://educonnect.dev}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      access: unrestricted